name: Test README Update

on:
  push:
    branches:
      - docs/update_readme
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on:  ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run:  |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create .env.test file
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env.test
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env.test
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.test
          echo "TEST_DB_NAME=${{ secrets.TEST_DB_NAME }}" >> .env.test

          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env.test
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env.test
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.test

          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env.test
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env.test

          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env.test
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.test

          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env.test
          echo "REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}" >> .env.test

          echo "DEBUG=${{ secrets.DEBUG }}" >> .env.test

          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env.test
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env.test

      - name: Debug env
        run: cat .env.test

      - name: Build container
        run: docker compose -f docker-compose.test.yml build 

      - name: Run test inside docker
        run: docker compose -f docker-compose.test.yml run --rm app pytest

      - name: Stop docker
        run: docker compose down -v