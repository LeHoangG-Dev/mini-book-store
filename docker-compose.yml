version: "3.9"

services:
  db: 
    image: postgres:15
    container_name: postgres-db
    restart: always
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: fastapi-app
    depends_on:
      - db
    env_file:
      - .env.app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always

volumes:
  pgdata:
      
